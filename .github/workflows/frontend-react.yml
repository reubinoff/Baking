name: React App

on:
  push:
    branches: [ develop, reubinoff/storybook]
    paths:
    - 'react-client/**'
    - '.github/workflows/frontend-react.yml'

env: 
  RESOURCE_GROUP: baking-aks
  STORYBOOK_DISABLE_TELEMETRY: 1


jobs:
  test-storybook:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 21
          cache: 'npm'
          cache-dependency-path: react-client/package-lock.json
      - name: Cache node modules
        id: cache-npm
        uses: actions/cache@v3
        env:
          cache-name: cache-node-modules
        with:
          # npm cache files are stored in `~/.npm` on Linux/macOS
          path: ~/.npm
          key: ${{ runner.os }}-build-${{ env.cache-name }}-${{ hashFiles('react-client/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-build-${{ env.cache-name }}-
            ${{ runner.os }}-build-
            ${{ runner.os }}-
      - name: 'Install dependencies'
        run: |
          cd react-client
          npm install
      - name: 'Run storybook'
        run: |
          cd react-client
          npm run build-storybook
          npm run build

